name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Ensure Case-Sensitive File Names
      - name: Verify app_colors.dart exists
        run: |
          echo "Checking for app_colors.dart..."
          ls -la lib/constants/
          if [ ! -f lib/constants/app_colors.dart ]; then
            echo "Error: lib/constants/app_colors.dart not found!"
            exit 1
          fi

      # Step 3: Set Up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Step 4: Set Up Flutter 3.41.4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      # Step 5: Verify Flutter Installation
      - name: Flutter Doctor
        run: flutter doctor -v

      # Step 6: Clean Project
      - name: Clean Project
        run: flutter clean

      # Step 7: Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 8: Analyze Project
      - name: Analyze Project
        run: flutter analyze

      # Step 9: Build Release APK
      - name: Build Release APK
        run: flutter build apk --release

      # Step 10: Upload APK Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
